/**
 * Draw map
 */
function drawMap(geojson) {
  const projection = d3.geoMercator()
    .fitSize([width, height], geojson);

  const path = d3.geoPath(projection);

  g.selectAll("path")
    .data(geojson.features)
    .join("path")
    .attr("class", "district")

    /**
     * HTML IDs like:
     * district-0
     * district-1
     * district-165
     */
    .attr("id", d => {
      const number = d.properties.__index;
      return `district-${number}`;
    })

    .attr("d", path)

    /**
     * Background color from custom metadata.
     */
    .attr("fill", d => {
      const number = d.properties.__index;
      const custom = customMetadataByNumber[number];

      return custom?.color || "#dddddd";
    })

    .attr("stroke", "#555")
    .attr("stroke-width", 0.4)

    /**
     * Click district
     */
    /*.on("click", function(event, d) {
      event.stopPropagation();

      const number = d.properties.__index;

      zoomToDistrict(d, path);
      showDistrictInfo(number);
    });*/
	.on("click", function(event, d) {
  event.stopPropagation();

  const number = d.properties.__index;

  const originalMetadata = d.properties;

  const customMetadata =
    customMetadataByNumber[number];

  console.log("Original:", originalMetadata);
  console.log("Custom:", customMetadata);
  
  zoomToDistrict(d, path);

  showDistrictInfo(number, originalMetadata);
});
}

/**
 * Get district name from GeoJSON.
 */
function getDistrictName(feature) {
  const p = feature.properties || {};

  const name = p[DISTRICT_NAME_FIELD];

  if (!name) {
    console.warn(
      `Could not find district name field "${DISTRICT_NAME_FIELD}". Available fields:`,
      Object.keys(p),
      p
    );

    return "Unknown district";
  }

  return name;
}

/**
 * Add custom metadata using district name.
 *
 * Example:
 *
 * setDistrictMetadata("Märkisch-Oderland", {
 *   color: "#fed500",
 *   notes: "Hello"
 * });
 */
function setDistrictMetadata(name, metadata) {
  const number = districtNameToNumber[name];

  if (number === undefined) {
    console.warn(
      `District not found: "${name}". Check spelling. Available names are:`,
      Object.keys(districtNameToNumber)
    );

    return;
  }

  customMetadataByNumber[number] = {
    name,
    number,
    ...metadata
  };
}

/**
 * Zoom into district
 */
function zoomToDistrict(d, path) {
  const [[x0, y0], [x1, y1]] = path.bounds(d);

  svg.transition()
    .duration(750)
    .call(
      zoom.transform,
      d3.zoomIdentity
        .translate(width / 2, height / 2)
        .scale(
          Math.min(
            12,
            0.2 / Math.max(
              (x1 - x0) / width,
              (y1 - y0) / height
            )
          )
        )
        .translate(
          -(x0 + x1) / 2,
          -(y0 + y1) / 2
        )
    );
}

function showDistrictInfo(number, originalMetadata) {

  const custom =
    customMetadataByNumber[number] || {};

  info.html(`
    <h2>${districtNumberToName[number]}</h2>

    <h3>Custom Metadata</h3>
    <pre>${JSON.stringify(custom, null, 2)}</pre>

    <h3>Original GeoJSON Metadata</h3>
    <pre>${JSON.stringify(originalMetadata, null, 2)}</pre>
  `);
}
